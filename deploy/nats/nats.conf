# LMDM NATS broker configuration. TLS 1.3 + client cert auth (agents + server
# present their X.509 cert). See spec §7.1 Zero Trust + §7.2 PQ hybrid (broker
# does not yet speak X25519MLKEM768 natively — Go-side nats.go does; we let
# the cipher suite negotiation handle it).

jetstream {
    store_dir: "/data/jetstream"
}

tls {
    cert_file: "/secrets/server.crt"
    key_file:  "/secrets/server.key"
    ca_file:   "/secrets/ca.crt"
    verify:    true
    timeout:   5
}

port: 4222
http_port: 8222

# Reasonable defaults.
max_payload: 4mb
