kind: profile
metadata:
  name: anssi-eleve
  version: "1.0"
  description: "Durcissement ANSSI-BP-028 v2.0 — niveau Élevé (M + I + R + E)"
  locked: false

# Profil autonome couvrant les recommandations de grade M, I, R et E applicables
# post-installation sur un système Debian/Ubuntu (sans recompilation noyau).
# Références : ANSSI-BP-028 v2.0 — 03/10/2022
#
# Hors-scope :
#   R1-R4   — matériel/BIOS/Secure Boot (configuration physique)
#   R15-R27 — options de compilation noyau (nécessite noyau personnalisé)
#   R28     — partitionnement (installation uniquement)
#   R46     — SELinux (AppArmor utilisé sur Debian/Ubuntu)
#   R47-R49 — contrôle d'accès obligatoire avancé (SELinux hors scope Debian/Ubuntu)
#
# Remarques niveau E :
#   Les recommandations R4, R6, R15-R27 nécessitent une intervention hors LMDM
#   (configuration BIOS/UEFI, compilation noyau sur mesure, HSM/TPM).
#   Ce profil documente les exigences applicables logiciellement.

policies:

  # =========================================================================
  # GRADE M — identique à anssi-minimal (profil autonome, pas d'includes)
  # =========================================================================

  # ANSSI R8 — Paramétrer les options de configuration de la mémoire
  - name: anssi-r8-memory-sysctl
    actions:
      - type: sysctl
        params:
          kernel.dmesg_restrict: "1"
          kernel.kptr_restrict: "2"
          kernel.perf_cpu_time_max_percent: "1"
          kernel.perf_event_max_sample_rate: "1"
          kernel.perf_event_paranoid: "2"
          kernel.randomize_va_space: "2"
          kernel.sysrq: "0"
          kernel.unprivileged_bpf_disabled: "1"
          kernel.panic_on_oops: "1"

  # ANSSI R9 — Paramétrer les options de configuration du noyau
  - name: anssi-r9-kernel-sysctl
    actions:
      - type: sysctl
        params:
          kernel.pid_max: "65536"
          net.core.bpf_jit_harden: "2"

  # ANSSI R11 — Activer et configurer le LSM Yama
  - name: anssi-r11-yama-ptrace
    actions:
      - type: sysctl
        params:
          kernel.yama.ptrace_scope: "1"

  # ANSSI R12 — Paramétrer les options de configuration du réseau IPv4
  - name: anssi-r12-network-ipv4
    actions:
      - type: sysctl
        params:
          net.ipv4.ip_forward: "0"
          net.ipv4.conf.all.accept_local: "0"
          net.ipv4.conf.all.accept_redirects: "0"
          net.ipv4.conf.default.accept_redirects: "0"
          net.ipv4.conf.all.secure_redirects: "0"
          net.ipv4.conf.default.secure_redirects: "0"
          net.ipv4.conf.all.shared_media: "0"
          net.ipv4.conf.default.shared_media: "0"
          net.ipv4.conf.all.accept_source_route: "0"
          net.ipv4.conf.default.accept_source_route: "0"
          net.ipv4.conf.all.arp_filter: "1"
          net.ipv4.conf.all.arp_ignore: "2"
          net.ipv4.conf.all.route_localnet: "0"
          net.ipv4.conf.all.drop_gratuitous_arp: "1"
          net.ipv4.conf.default.rp_filter: "1"
          net.ipv4.conf.all.rp_filter: "1"
          net.ipv4.conf.default.send_redirects: "0"
          net.ipv4.conf.all.send_redirects: "0"
          net.ipv4.icmp_ignore_bogus_error_responses: "1"
          net.ipv4.ip_local_port_range: "32768 65535"
          net.ipv4.tcp_rfc1337: "1"
          net.ipv4.tcp_syncookies: "1"

  # ANSSI R14 — Paramétrer les options de configuration des systèmes de fichiers
  - name: anssi-r14-filesystem-sysctl
    actions:
      - type: sysctl
        params:
          fs.suid_dumpable: "0"
          fs.protected_fifos: "2"
          fs.protected_regular: "2"
          fs.protected_symlinks: "1"
          fs.protected_hardlinks: "1"

  # ANSSI R31 — Utiliser des mots de passe robustes
  - name: anssi-r31-password-quality
    actions:
      - type: package_ensure
        params:
          present:
            - libpam-pwquality
      - type: file_content
        params:
          path: /etc/security/pwquality.conf
          content: |
            # ANSSI R31 — Politique de mots de passe robustes (niveau E)
            minlen = 16
            minclass = 4
            maxrepeat = 2
            maxclassrepeat = 0
            lcredit = 0
            ucredit = 0
            dcredit = 0
            ocredit = 0
            gecoscheck = 1
            dictcheck = 1

  # ANSSI R36 — Modifier la valeur par défaut de UMASK
  - name: anssi-r36-umask
    actions:
      - type: file_content
        params:
          path: /etc/profile.d/lmdm-anssi-umask.sh
          content: |
            # ANSSI R36 — Valeur UMASK restrictive
            umask 0077

  # ANSSI R38/R39/R42/R44 — sudo hardening
  - name: anssi-r38-r39-r42-r44-sudo
    actions:
      - type: file_content
        params:
          path: /etc/sudoers.d/lmdm-anssi
          content: |
            # ANSSI R38/R39/R42/R44 — Durcissement sudo
            Defaults noexec
            Defaults requiretty
            Defaults use_pty
            Defaults umask=0027
            Defaults ignore_dot
            Defaults env_reset
            Defaults !visiblepw
            Defaults passwd_tries=3
            Defaults passwd_timeout=1

  # ANSSI R45 — Activer les profils de sécurité AppArmor
  - name: anssi-r45-apparmor
    actions:
      - type: package_ensure
        params:
          present:
            - apparmor
            - apparmor-utils
            - apparmor-profiles
            - apparmor-profiles-extra
      - type: service_ensure
        params:
          enabled:
            - apparmor

  # ANSSI R50 — Restreindre les droits d'accès aux fichiers sensibles
  - name: anssi-r50-sensitive-files
    actions:
      - type: file_content
        params:
          path: /etc/cron.daily/lmdm-anssi-r50-check
          content: |
            #!/bin/sh
            # ANSSI R50 — Vérification des droits sur fichiers sensibles
            chmod 640 /etc/shadow 2>/dev/null || true
            chmod 640 /etc/gshadow 2>/dev/null || true
            chmod 644 /etc/passwd 2>/dev/null || true
            chmod 644 /etc/group 2>/dev/null || true
            chown root:shadow /etc/shadow 2>/dev/null || true
            chown root:shadow /etc/gshadow 2>/dev/null || true

  # ANSSI R53/R54 — Filesystem checks
  - name: anssi-r53-r54-filesystem-checks
    actions:
      - type: file_content
        params:
          path: /etc/cron.weekly/lmdm-anssi-r53-r54-check
          content: |
            #!/bin/sh
            # ANSSI R53 — Signalement des fichiers sans propriétaire connu
            find / -xdev \( -nouser -o -nogroup \) -ls 2>/dev/null | \
              logger -t lmdm-anssi-r53 -p auth.warning
            # ANSSI R54 — Sticky bit sur répertoires world-writable
            find / -xdev -type d -perm -0002 -a ! -perm -1000 \
              -exec chmod +t {} \; 2>/dev/null

  # ANSSI R56 — Éviter l'usage d'exécutables setuid/setgid
  - name: anssi-r56-setuid-audit
    actions:
      - type: file_content
        params:
          path: /etc/cron.weekly/lmdm-anssi-r56-check
          content: |
            #!/bin/sh
            # ANSSI R56 — Recensement des binaires setuid/setgid
            find / -xdev -type f -perm /6000 -ls 2>/dev/null | \
              logger -t lmdm-anssi-r56 -p auth.warning

  # ANSSI R58/R59 — apt hardening
  - name: anssi-r58-r59-apt-hardening
    actions:
      - type: file_content
        params:
          path: /etc/apt/apt.conf.d/99-lmdm-anssi
          content: |
            # ANSSI R58/R59 — Durcissement APT
            APT::Get::AllowUnauthenticated "false";
            Acquire::AllowInsecureRepositories "false";
            Acquire::AllowDowngradeToInsecureRepositories "false";
            APT::Periodic::Update-Package-Lists "1";
            APT::Periodic::Download-Upgradeable-Packages "1";
            APT::Periodic::AutocleanInterval "7";
      - type: package_ensure
        params:
          absent:
            - telnet
            - rsh-client
            - rsh-server
            - talk
            - talkd
            - xinetd

  # ANSSI R61 — Mises à jour régulières
  - name: anssi-r61-automatic-updates
    actions:
      - type: package_ensure
        params:
          present:
            - unattended-upgrades
      - type: service_ensure
        params:
          enabled:
            - unattended-upgrades
      - type: file_content
        params:
          path: /etc/apt/apt.conf.d/20auto-upgrades
          content: |
            # ANSSI R61 — Mises à jour automatiques de sécurité
            APT::Periodic::Update-Package-Lists "1";
            APT::Periodic::Unattended-Upgrade "1";

  # ANSSI R62 — Désactiver les services non nécessaires
  - name: anssi-r62-disable-unused-services
    actions:
      - type: service_ensure
        params:
          disabled:
            - avahi-daemon
            - cups
            - bluetooth
            - rpcbind

  # ANSSI R67/R68 — PAM faillock
  - name: anssi-r67-r68-pam-faillock
    actions:
      - type: package_ensure
        params:
          present:
            - libpam-faillock
      - type: file_content
        params:
          path: /etc/security/faillock.conf
          content: |
            # ANSSI R67/R68 — Verrouillage de compte après échecs (niveau E)
            deny = 3
            unlock_time = 1800
            fail_interval = 900
            audit
            silent

  # ANSSI R71/R72 — Journalisation
  - name: anssi-r71-r72-logging
    actions:
      - type: package_ensure
        params:
          present:
            - rsyslog
      - type: service_ensure
        params:
          enabled:
            - rsyslog
      - type: file_content
        params:
          path: /etc/rsyslog.d/99-lmdm-anssi.conf
          content: |
            # ANSSI R71/R72 — Journalisation sécurisée
            $FileOwner root
            $FileGroup adm
            $FileCreateMode 0640
            $DirCreateMode 0750
            $Umask 0022
            auth,authpriv.*  /var/log/auth.log
            kern.*           /var/log/kern.log
          post_apply_command: systemctl restart rsyslog
          post_apply_timeout: 30s

  # ANSSI R74/R75 — Messagerie
  - name: anssi-r74-r75-mail-aliases
    actions:
      - type: file_content
        params:
          path: /etc/aliases
          content: |
            # ANSSI R75 — Alias de messagerie
            postmaster: root
            root: admins@localhost
            daemon: root
            nobody: root
            bin: root
            sys: root
          post_apply_command: newaliases
          post_apply_timeout: 30s

  # ANSSI R80 — Surface d'attaque réseau
  - name: anssi-r80-network-attack-surface
    actions:
      - type: package_ensure
        params:
          absent:
            - nis
            - rsh-server
            - telnetd
            - tftpd
            - ftpd

  # =========================================================================
  # GRADE I — Recommandations intermédiaires (reprises intégralement)
  # =========================================================================

  # ANSSI R7 — Activer l'IOMMU (paramètre ligne de commande noyau)
  - name: anssi-r7-iommu-grub
    actions:
      - type: file_content
        params:
          path: /etc/default/grub.d/lmdm-anssi-iommu.cfg
          content: |
            # ANSSI R7 — Activation IOMMU (M+I+R+E)
            GRUB_CMDLINE_LINUX="$GRUB_CMDLINE_LINUX iommu=force"

  # ANSSI R10 — Désactiver le chargement des modules noyau (note niveau I)
  - name: anssi-r10-modules-disabled-note
    actions:
      - type: file_content
        params:
          path: /etc/modprobe.d/lmdm-anssi-r10-note.conf
          content: |
            # ANSSI R10 — Désactivation du chargement de modules noyau
            # kernel.modules_disabled=1 peut être activé dans /etc/sysctl.d/
            # après validation que tous les modules nécessaires sont chargés.
            # Cette option est irréversible sans redémarrage.
            # En niveau R+E, les modules superflus sont en blacklist.

  # ANSSI R13 — Désactiver le plan IPv6 (si non utilisé)
  - name: anssi-r13-ipv6-disable
    actions:
      - type: sysctl
        params:
          net.ipv6.conf.all.disable_ipv6: "1"
          net.ipv6.conf.default.disable_ipv6: "1"
      - type: file_content
        params:
          path: /etc/sysctl.d/99-lmdm-anssi-ipv6.conf
          content: |
            # ANSSI R13 — Désactivation IPv6 si non utilisé
            net.ipv6.conf.all.disable_ipv6 = 1
            net.ipv6.conf.default.disable_ipv6 = 1

  # ANSSI R29 — Restreindre les accès au dossier /boot
  - name: anssi-r29-boot-permissions
    actions:
      - type: file_content
        params:
          path: /etc/cron.daily/lmdm-anssi-r29-boot
          content: |
            #!/bin/sh
            # ANSSI R29 — Droits restrictifs sur /boot (M+I+R+E)
            chmod 700 /boot 2>/dev/null || true
            chown root:root /boot 2>/dev/null || true
            if command -v aide >/dev/null 2>&1; then
              aide --check 2>/dev/null | logger -t lmdm-anssi-r29 -p auth.warning || true
            fi

  # ANSSI R32 — Expirer les sessions utilisateur locales
  - name: anssi-r32-session-timeout
    actions:
      - type: file_content
        params:
          path: /etc/profile.d/lmdm-anssi-tmout.sh
          content: |
            # ANSSI R32 — Expiration des sessions locales inactives (10 minutes, niveau E)
            TMOUT=600
            readonly TMOUT
            export TMOUT

  # ANSSI R33 — Assurer l'imputabilité des actions d'administration
  - name: anssi-r33-admin-accountability
    actions:
      - type: file_content
        params:
          path: /etc/profile.d/lmdm-anssi-history.sh
          content: |
            # ANSSI R33 — Historique shell sécurisé pour imputabilité
            HISTSIZE=10000
            HISTFILESIZE=20000
            HISTTIMEFORMAT="%F %T "
            export HISTSIZE HISTFILESIZE HISTTIMEFORMAT

  # ANSSI R34/R35 — Vérification des comptes de service
  - name: anssi-r34-r35-service-accounts
    actions:
      - type: file_content
        params:
          path: /etc/cron.daily/lmdm-anssi-r34-check
          content: |
            #!/bin/sh
            # ANSSI R34 — Vérification des comptes de service
            awk -F: '$7 !~ /nologin|false/ && $3 < 1000 && $1 !~ /^(root|sync|shutdown|halt)$/ {
              print "WARNING: service account with login shell: " $1
            }' /etc/passwd | logger -t lmdm-anssi-r34 -p auth.warning

  # ANSSI R39/R40/R41 — sudo directives avancées niveau I
  - name: anssi-r39-r40-r41-sudo-advanced
    actions:
      - type: file_content
        params:
          path: /etc/sudoers.d/lmdm-anssi-advanced
          content: |
            # ANSSI R39/R40/R41 — Directives sudo avancées niveau I
            Defaults log_output
            Defaults!/usr/bin/sudoreplay !log_output
            Defaults!/sbin/reboot !log_output

  # ANSSI R52 — Restreindre les accès aux sockets et pipes nommées
  - name: anssi-r52-ipc-restrictions
    actions:
      - type: file_content
        params:
          path: /etc/cron.daily/lmdm-anssi-r52-check
          content: |
            #!/bin/sh
            # ANSSI R52 — Vérification des sockets et pipes world-accessible
            find / -xdev \( -type s -o -type p \) -perm -0002 -ls 2>/dev/null | \
              logger -t lmdm-anssi-r52 -p auth.warning

  # ANSSI R55 — Séparer les répertoires temporaires des utilisateurs
  - name: anssi-r55-tmp-separation
    actions:
      - type: package_ensure
        params:
          present:
            - libpam-tmpdir
      - type: file_content
        params:
          path: /etc/tmpfiles.d/lmdm-anssi.conf
          content: |
            # ANSSI R55 — Répertoires temporaires par utilisateur
            # q /tmp 1777 root root -
            # q /var/tmp 1777 root root -

  # ANSSI R63 — Désactiver les fonctionnalités des services non essentielles
  - name: anssi-r63-service-features
    actions:
      - type: service_ensure
        params:
          disabled:
            - avahi-daemon
            - cups
            - bluetooth
            - rpcbind
            - nfs-common
            - autofs

  # ANSSI R69/R70 — Sécuriser les accès aux bases utilisateur distantes (NSS)
  - name: anssi-r69-r70-nss-security
    actions:
      - type: file_content
        params:
          path: /etc/nsswitch.conf
          content: |
            # ANSSI R69/R70 — NSS : bases locales prioritaires
            passwd:   files systemd
            group:    files systemd
            shadow:   files
            gshadow:  files
            hosts:    files dns
            networks: files
            protocols: db files
            services: db files
            ethers:   db files
            rpc:      db files

  # ANSSI R73 — Journaliser l'activité système avec auditd (niveau I)
  - name: anssi-r73-auditd-base
    actions:
      - type: package_ensure
        params:
          present:
            - auditd
            - audispd-plugins
      - type: service_ensure
        params:
          enabled:
            - auditd
      - type: file_content
        params:
          path: /etc/audit/rules.d/lmdm-anssi.rules
          content: |
            # ANSSI R73 — Règles auditd (niveau I)
            -w /sbin/insmod -p x
            -w /sbin/modprobe -p x
            -w /sbin/rmmod -p x
            -w /bin/kmod -p x
            -w /etc/ -p wa
            -a exit,always -S mount -S umount2
            -a exit,always -S modify_ldt
            -a exit,always -S get_kernel_syms -S ptrace
            -a exit,always -S prctl
            -a exit,always -F arch=b64 -S init_module -S delete_module -S finit_module
            -e 2
          post_apply_command: systemctl restart auditd
          post_apply_timeout: 30s

  # ANSSI R78 — Cloisonner les services réseau (niveau I)
  - name: anssi-r78-nftables-base
    actions:
      - type: nftables_rules
        params:
          name: anssi-base
          content: |
            #!/usr/sbin/nft -f
            # ANSSI R78 — Pare-feu de base (M+I+R+E)
            table inet filter {
              chain input {
                type filter hook input priority 0; policy drop;
                ct state established,related accept
                iif "lo" accept
                ip protocol icmp icmp type { echo-request, echo-reply, destination-unreachable, time-exceeded, parameter-problem } accept
                ip6 nexthdr icmpv6 icmpv6 type { echo-request, echo-reply, destination-unreachable, time-exceeded, parameter-problem, nd-router-advert, nd-neighbor-solicit, nd-neighbor-advert } accept
                tcp dport 22 ct state new accept
                counter drop
              }
              chain forward {
                type filter hook forward priority 0; policy drop;
              }
              chain output {
                type filter hook output priority 0; policy accept;
              }
            }

  # ANSSI R79 — Durcir et surveiller les services exposés (niveau I)
  - name: anssi-r79-exposed-services-hardening
    actions:
      - type: file_content
        params:
          path: /etc/cron.daily/lmdm-anssi-r79-ports
          content: |
            #!/bin/sh
            # ANSSI R79 — Recensement des services réseau en écoute
            ss -tlnp 2>/dev/null | logger -t lmdm-anssi-r79 -p daemon.info

  # =========================================================================
  # GRADE R — Recommandations renforcées (reprises intégralement)
  # =========================================================================

  # ANSSI R8/R9/R11/R12/R13/R14 — Persistance sysctl complète (niveau R+E)
  - name: anssi-sysctl-persist-eleve
    actions:
      - type: file_content
        params:
          path: /etc/sysctl.d/99-lmdm-anssi.conf
          content: |
            # Managed by LMDM — ANSSI-BP-028 v2.0 (M+I+R+E level)
            # ANSSI R8 — Configuration mémoire
            kernel.dmesg_restrict = 1
            kernel.kptr_restrict = 2
            kernel.perf_cpu_time_max_percent = 1
            kernel.perf_event_max_sample_rate = 1
            kernel.perf_event_paranoid = 2
            kernel.randomize_va_space = 2
            kernel.sysrq = 0
            kernel.unprivileged_bpf_disabled = 1
            kernel.panic_on_oops = 1
            # ANSSI R9 — Configuration noyau
            kernel.pid_max = 65536
            net.core.bpf_jit_harden = 2
            # ANSSI R10 — Gel du chargement des modules (activer manuellement)
            # ATTENTION: irréversible sans redémarrage
            # kernel.modules_disabled = 1
            # ANSSI R11 — LSM Yama
            kernel.yama.ptrace_scope = 1
            # ANSSI R12 — Réseau IPv4
            net.ipv4.ip_forward = 0
            net.ipv4.conf.all.accept_local = 0
            net.ipv4.conf.all.accept_redirects = 0
            net.ipv4.conf.default.accept_redirects = 0
            net.ipv4.conf.all.secure_redirects = 0
            net.ipv4.conf.default.secure_redirects = 0
            net.ipv4.conf.all.shared_media = 0
            net.ipv4.conf.default.shared_media = 0
            net.ipv4.conf.all.accept_source_route = 0
            net.ipv4.conf.default.accept_source_route = 0
            net.ipv4.conf.all.arp_filter = 1
            net.ipv4.conf.all.arp_ignore = 2
            net.ipv4.conf.all.route_localnet = 0
            net.ipv4.conf.all.drop_gratuitous_arp = 1
            net.ipv4.conf.default.rp_filter = 1
            net.ipv4.conf.all.rp_filter = 1
            net.ipv4.conf.default.send_redirects = 0
            net.ipv4.conf.all.send_redirects = 0
            net.ipv4.icmp_ignore_bogus_error_responses = 1
            net.ipv4.ip_local_port_range = 32768 65535
            net.ipv4.tcp_rfc1337 = 1
            net.ipv4.tcp_syncookies = 1
            # ANSSI R13 — Désactivation IPv6
            net.ipv6.conf.all.disable_ipv6 = 1
            net.ipv6.conf.default.disable_ipv6 = 1
            # ANSSI R14 — Systèmes de fichiers
            fs.suid_dumpable = 0
            fs.protected_fifos = 2
            fs.protected_regular = 2
            fs.protected_symlinks = 1
            fs.protected_hardlinks = 1
          post_apply_command: sysctl -p /etc/sysctl.d/99-lmdm-anssi.conf
          post_apply_timeout: 30s

  # ANSSI R10 — Blacklist des modules système de fichiers superflus (R+E)
  - name: anssi-r10-module-blacklist-filesystem
    actions:
      - type: kernel_module_blacklist
        params:
          name: anssi-fs-modules
          modules:
            - cramfs
            - freevxfs
            - jffs2
            - hfs
            - hfsplus
            - squashfs
            - udf

  # ANSSI R10 — Blacklist des modules réseau superflus (R+E)
  - name: anssi-r10-module-blacklist-network
    actions:
      - type: kernel_module_blacklist
        params:
          name: anssi-net-modules
          modules:
            - dccp
            - sctp
            - rds
            - tipc

  # ANSSI R10 — Blacklist des modules USB superflus (R+E)
  - name: anssi-r10-module-blacklist-usb
    actions:
      - type: kernel_module_blacklist
        params:
          name: anssi-usb-modules
          modules:
            - usb_storage
            - firewire_core

  # ANSSI R37 — AppArmor enforce (R+E)
  - name: anssi-r37-apparmor-enforce
    actions:
      - type: file_content
        params:
          path: /etc/cron.daily/lmdm-anssi-r37-apparmor
          content: |
            #!/bin/sh
            # ANSSI R37 — Passer tous les profils AppArmor en mode enforce
            if command -v aa-enforce >/dev/null 2>&1; then
              aa-enforce /etc/apparmor.d/* 2>/dev/null || true
            fi
            if command -v apparmor_status >/dev/null 2>&1; then
              apparmor_status 2>/dev/null | logger -t lmdm-anssi-r37 -p daemon.info || true
            fi

  # ANSSI R38 — Restriction sudo renforcée (R+E)
  - name: anssi-r38-sudo-group-renforce
    actions:
      - type: file_content
        params:
          path: /etc/sudoers.d/lmdm-anssi-renforce
          content: |
            # ANSSI R38 — Restriction des droits sudo (M+I+R+E)
            Defaults log_input
            Defaults log_output
            Defaults!/usr/bin/sudoreplay !log_output
            Defaults loglinelen=0
            Defaults syslog=auth

  # ANSSI R41 — Limiter les droits d'exécution sudo (R+E)
  - name: anssi-r41-sudo-exec-renforce
    actions:
      - type: file_content
        params:
          path: /etc/cron.daily/lmdm-anssi-r41-sudo-check
          content: |
            #!/bin/sh
            # ANSSI R41 — Vérification des règles sudo
            grep -r 'NOEXEC\|!exec' /etc/sudoers /etc/sudoers.d/ 2>/dev/null | \
              logger -t lmdm-anssi-r41 -p auth.info || true

  # ANSSI R45 — AppArmor enforce (R+E)
  - name: anssi-r45-apparmor-renforce
    actions:
      - type: package_ensure
        params:
          present:
            - apparmor
            - apparmor-utils
            - apparmor-profiles
            - apparmor-profiles-extra
      - type: service_ensure
        params:
          enabled:
            - apparmor
      - type: file_content
        params:
          path: /etc/default/apparmor
          content: |
            # ANSSI R45 — AppArmor en mode enforce (M+I+R+E)
            GRUB_CMDLINE_LINUX_DEFAULT="$GRUB_CMDLINE_LINUX_DEFAULT apparmor=1 security=apparmor"

  # ANSSI R51 — Fichiers temporaires sensibles (R+E)
  - name: anssi-r51-sensitive-tempfiles
    actions:
      - type: file_content
        params:
          path: /etc/cron.daily/lmdm-anssi-r51-check
          content: |
            #!/bin/sh
            # ANSSI R51 — Recherche de fichiers sensibles dans /tmp et /var/tmp
            find /tmp /var/tmp -maxdepth 2 -type f \( \
              -name "*.key" -o -name "*.pem" -o -name "*.cert" \
              -o -name "*password*" -o -name "*secret*" -o -name "*token*" \
            \) 2>/dev/null | logger -t lmdm-anssi-r51 -p auth.warning

  # ANSSI R57 — Restreindre les binaires setuid root (R+E)
  - name: anssi-r57-setuid-root-restrict
    actions:
      - type: file_content
        params:
          path: /etc/cron.daily/lmdm-anssi-r57-setuid
          content: |
            #!/bin/sh
            # ANSSI R57 — Recensement des binaires setuid root
            find / -xdev -type f -perm -4000 -user root -ls 2>/dev/null | \
              logger -t lmdm-anssi-r57-setuid -p auth.warning
            find / -xdev -type f -perm -2000 -ls 2>/dev/null | \
              logger -t lmdm-anssi-r57-setgid -p auth.warning

  # ANSSI R60 — Dépôts logiciels sécurisés (R+E)
  - name: anssi-r60-hardened-repos
    actions:
      - type: file_content
        params:
          path: /etc/apt/apt.conf.d/99-lmdm-anssi-renforce
          content: |
            # ANSSI R60 — Durcissement des dépôts (M+I+R+E)
            APT::Get::AllowUnauthenticated "false";
            Acquire::AllowInsecureRepositories "false";
            Acquire::AllowDowngradeToInsecureRepositories "false";
            Acquire::Check-Valid-Until "true";
            APT::Authentication::TrustCDROM "false";

  # ANSSI R64 — Restreindre les privilèges des services (R+E)
  - name: anssi-r64-service-privileges
    actions:
      - type: file_content
        params:
          path: /etc/cron.daily/lmdm-anssi-r64-check
          content: |
            #!/bin/sh
            # ANSSI R64 — Vérification des services s'exécutant en root
            systemctl list-units --type=service --state=running --no-pager -l 2>/dev/null | \
              logger -t lmdm-anssi-r64 -p daemon.info || true

  # ANSSI R65 — Isoler les services réseau (R+E — systemd sandboxing)
  - name: anssi-r65-service-isolation
    actions:
      - type: file_content
        params:
          path: /etc/systemd/system/lmdm-anssi-r65-hardening.conf
          content: |
            # ANSSI R65 — Directives de durcissement systemd (M+I+R+E)
            # [Service]
            # NoNewPrivileges=yes
            # ProtectSystem=strict
            # ProtectHome=yes
            # PrivateTmp=yes
            # PrivateDevices=yes
            # CapabilityBoundingSet=
            # RestrictSUIDSGID=yes
            # SystemCallFilter=@system-service
          post_apply_command: systemctl daemon-reload
          post_apply_timeout: 30s

  # ANSSI R71/R72/R73 — Journalisation renforcée (R+E)
  - name: anssi-r71-r72-r73-logging-renforce
    actions:
      - type: package_ensure
        params:
          present:
            - auditd
            - audispd-plugins
            - rsyslog
      - type: service_ensure
        params:
          enabled:
            - auditd
            - rsyslog
      - type: file_content
        params:
          path: /etc/audit/rules.d/lmdm-anssi-renforce.rules
          content: |
            # ANSSI R71/R72/R73 — Règles auditd renforcées (M+I+R+E)
            -w /sbin/insmod -p x
            -w /sbin/modprobe -p x
            -w /sbin/rmmod -p x
            -w /bin/kmod -p x
            -w /etc/ -p wa
            -w /boot/ -p wa
            -w /usr/lib/ -p wa
            -w /usr/bin/ -p wa
            -w /usr/sbin/ -p wa
            -a exit,always -S mount -S umount2
            -a exit,always -S modify_ldt
            -a exit,always -S get_kernel_syms -S ptrace
            -a exit,always -S prctl
            -a exit,always -F arch=b64 -S init_module -S delete_module -S finit_module
            -a exit,always -F arch=b64 -S chmod -S fchmod -S fchmodat
            -a exit,always -F arch=b64 -S chown -S fchown -S fchownat -S lchown
            -a exit,always -F arch=b64 -S connect -S accept4
            -w /usr/bin/passwd -p x
            -w /usr/bin/sudo -p x
            -w /usr/bin/su -p x
            -e 2
          post_apply_command: systemctl restart auditd
          post_apply_timeout: 30s

  # ANSSI R76 — Contrôle d'intégrité des fichiers système (R+E — AIDE)
  - name: anssi-r76-file-integrity
    actions:
      - type: package_ensure
        params:
          present:
            - aide
            - aide-common
      - type: file_content
        params:
          path: /etc/cron.daily/lmdm-anssi-r76-aide
          content: |
            #!/bin/sh
            # ANSSI R76 — Contrôle d'intégrité avec AIDE
            AIDE_DB=/var/lib/aide/aide.db
            mkdir -p /var/log/aide
            if [ ! -f "$AIDE_DB" ]; then
              aide --init 2>&1 | logger -t lmdm-anssi-r76-init -p daemon.info
              if [ -f /var/lib/aide/aide.db.new ]; then
                mv /var/lib/aide/aide.db.new "$AIDE_DB"
              fi
            else
              aide --check 2>&1 | logger -t lmdm-anssi-r76 -p auth.warning
            fi

  # ANSSI R77 — Sauvegarder et protéger les journaux (R+E)
  - name: anssi-r77-log-protection
    actions:
      - type: file_content
        params:
          path: /etc/logrotate.d/lmdm-anssi-r77
          content: |
            # ANSSI R77 — Protection et rotation des journaux (M+I+R+E)
            /var/log/auth.log /var/log/kern.log /var/log/syslog {
              daily
              rotate 90
              compress
              delaycompress
              missingok
              notifempty
              create 0640 root adm
              sharedscripts
              postrotate
                systemctl kill --signal=HUP rsyslog 2>/dev/null || true
              endscript
            }
            /var/log/audit/audit.log {
              daily
              rotate 90
              compress
              delaycompress
              missingok
              notifempty
              create 0600 root root
              postrotate
                systemctl kill --signal=HUP auditd 2>/dev/null || true
              endscript
            }

  # ANSSI R78 — Pare-feu renforcé (R+E)
  - name: anssi-r78-nftables-renforce
    actions:
      - type: nftables_rules
        params:
          name: anssi-renforce
          content: |
            #!/usr/sbin/nft -f
            # ANSSI R78 — Pare-feu renforcé (M+I+R+E)
            table inet filter {
              chain input {
                type filter hook input priority 0; policy drop;
                ct state established,related accept
                ct state invalid drop
                iif "lo" accept
                ip protocol icmp icmp type { echo-request, echo-reply, destination-unreachable, time-exceeded, parameter-problem } limit rate 10/second accept
                ip6 nexthdr icmpv6 icmpv6 type { echo-request, echo-reply, destination-unreachable, time-exceeded, parameter-problem, nd-router-advert, nd-neighbor-solicit, nd-neighbor-advert } accept
                tcp dport 22 ct state new limit rate 6/minute accept
                log prefix "nft-drop-input: " flags all counter drop
              }
              chain forward {
                type filter hook forward priority 0; policy drop;
                log prefix "nft-drop-forward: " counter drop
              }
              chain output {
                type filter hook output priority 0; policy accept;
              }
            }

  # =========================================================================
  # GRADE E — Recommandations élevées supplémentaires
  # =========================================================================

  # ANSSI R4 — Protéger le BIOS/UEFI par un mot de passe
  # ANSSI R6 — Activer le démarrage sécurisé (Secure Boot)
  # ANSSI R15-R27 — Options de compilation noyau (HORS SCOPE)
  # Ces recommandations nécessitent une configuration hors LMDM :
  #   - R4  : mot de passe BIOS/UEFI (configuration physique)
  #   - R6  : Secure Boot (clé de signature propre, UEFI)
  #   - R15-R27 : noyau compilé avec options spécifiques
  # Documenter ces exigences dans le guide d'installation du système.
  - name: anssi-eleve-hors-scope-note
    actions:
      - type: file_content
        params:
          path: /etc/lmdm/anssi-eleve-requirements.txt
          content: |
            # ANSSI-BP-028 v2.0 — Exigences niveau Élevé hors-scope LMDM
            #
            # Les recommandations suivantes nécessitent une intervention manuelle
            # ou une configuration matérielle hors du périmètre de LMDM :
            #
            # R4  — Protéger le BIOS/UEFI par un mot de passe administrateur
            #        → Configurer dans le firmware lors de l'installation physique
            #
            # R6  — Activer le démarrage sécurisé UEFI (Secure Boot)
            #        → Nécessite des clés de signature propres et un shim signé
            #        → Voir : https://wiki.debian.org/SecureBoot
            #
            # R15 — Compiler le noyau avec CONFIG_CC_STACKPROTECTOR_STRONG
            # R16 — Compiler avec CONFIG_STRICT_KERNEL_RWX
            # R17 — Compiler avec CONFIG_DEBUG_RODATA
            # R18 — Compiler avec CONFIG_VMAP_STACK
            # R19 — Compiler avec CONFIG_RANDOMIZE_BASE (KASLR)
            # R20 — Compiler avec CONFIG_RANDOMIZE_MEMORY
            # R21 — Compiler avec CONFIG_GCC_PLUGIN_LATENT_ENTROPY
            # R22 — Compiler avec CONFIG_GCC_PLUGIN_STRUCTLEAK_BYREF_ALL
            # R23 — Compiler avec CONFIG_SLUB (désactiver SLOB/SLAB)
            # R24 — Compiler avec CONFIG_DEBUG_LIST
            # R25 — Compiler avec CONFIG_BUG_ON_DATA_CORRUPTION
            # R26 — Compiler sans CONFIG_ACPI_CUSTOM_METHOD
            # R27 — Compiler sans CONFIG_COMPAT_VDSO
            #        → Utiliser un noyau compilé sur mesure ou linux-hardened
            #
            # R46 — SELinux en mode enforcing
            #        → SELinux non supporté nativement sur Debian/Ubuntu
            #        → AppArmor est l'alternative (voir R37/R45 dans ce profil)
            #        → Pour SELinux : utiliser une distribution basée RHEL/Fedora
            #
            # R47-R49 — Politique SELinux stricte et confinement des processus
            #        → Hors scope sur Debian/Ubuntu (voir R37/R45 AppArmor)

  # ANSSI R66 — Authentification multifacteur pour les accès privilégiés (E)
  - name: anssi-r66-mfa-privileged-access
    actions:
      - type: package_ensure
        params:
          present:
            - libpam-google-authenticator
      - type: file_content
        params:
          path: /etc/pam.d/lmdm-anssi-r66-mfa-note
          content: |
            # ANSSI R66 — Authentification multifacteur pour accès privilégiés (niveau E)
            # Pour activer TOTP via Google Authenticator sur sudo/su :
            #   1. Chaque administrateur exécute : google-authenticator
            #   2. Ajouter dans /etc/pam.d/sudo :
            #      auth required pam_google_authenticator.so
            #   3. Ou pour SSH avec MFA :
            #      Configurer /etc/pam.d/sshd et sshd_config (ChallengeResponseAuthentication yes)
            # Cette configuration est spécifique à chaque utilisateur et
            # doit être réalisée manuellement.

  # ANSSI R76/R77 — Intégrité et journaux renforcés (E — configuration avancée AIDE)
  - name: anssi-r76-r77-aide-eleve
    actions:
      - type: file_content
        params:
          path: /etc/aide/aide.conf.d/99-lmdm-anssi-eleve
          content: |
            # ANSSI R76/R77 — Configuration AIDE renforcée (niveau E)
            # Surveillance étendue : binaires système, bibliothèques, config critique
            /bin     FIPSR+sha512
            /sbin    FIPSR+sha512
            /usr/bin FIPSR+sha512
            /usr/sbin FIPSR+sha512
            /usr/lib FIPSR+sha512
            /lib     FIPSR+sha512
            /lib64   FIPSR+sha512
            /etc/passwd FIPSR+sha512
            /etc/shadow FIPSR+sha512
            /etc/group  FIPSR+sha512
            /etc/sudoers FIPSR+sha512
            /etc/sudoers.d FIPSR+sha512
            /boot    FIPSR+sha512
            # Exclusions
            !/var
            !/tmp
            !/proc
            !/sys
            !/run

  # ANSSI R78 — Pare-feu élevé (E — isolation maximale)
  - name: anssi-r78-nftables-eleve
    actions:
      - type: nftables_rules
        params:
          name: anssi-eleve
          content: |
            #!/usr/sbin/nft -f
            # ANSSI R78 — Pare-feu niveau Élevé (M+I+R+E)
            # Isolation maximale avec journalisation complète
            table inet filter {
              chain input {
                type filter hook input priority 0; policy drop;
                ct state established,related accept
                ct state invalid log prefix "nft-invalid: " counter drop
                iif "lo" accept
                # ICMP limité
                ip protocol icmp icmp type { echo-request, echo-reply, destination-unreachable, time-exceeded, parameter-problem } limit rate 5/second accept
                ip6 nexthdr icmpv6 icmpv6 type { echo-request, echo-reply, destination-unreachable, time-exceeded, parameter-problem, nd-router-advert, nd-neighbor-solicit, nd-neighbor-advert } accept
                # SSH avec rate limiting strict
                tcp dport 22 ct state new limit rate 3/minute burst 5 packets accept
                # Journaliser et rejeter tout le reste
                log prefix "nft-drop-input-E: " flags all counter drop
              }
              chain forward {
                type filter hook forward priority 0; policy drop;
                log prefix "nft-drop-forward-E: " counter drop
              }
              chain output {
                type filter hook output priority 0; policy accept;
                # Journaliser les connexions sortantes anormales
                ct state invalid log prefix "nft-invalid-out: " counter drop
              }
            }
