// LMDM — Linux MDM
// Enrollment service: agent registration and certificate issuance.
// Transport: gRPC with TLS (PQ hybrid handshake).

syntax = "proto3";

package lmdm.v1;

import "google/protobuf/timestamp.proto";
import "lmdm/v1/common.proto";

option go_package = "github.com/cto-externe/lmdm/gen/go/lmdm/v1;lmdmv1";

// ---------------------------------------------------------------------------
// gRPC Service
// ---------------------------------------------------------------------------

service EnrollmentService {
  // Enroll a new agent. Called once at first boot.
  // The agent presents a one-time token and its public key.
  // The server returns a signed certificate and the agent's configuration.
  rpc Enroll(EnrollRequest) returns (EnrollResponse);

  // Renew an agent's certificate before expiration.
  // Requires valid existing mTLS authentication.
  rpc RenewCertificate(RenewCertificateRequest) returns (RenewCertificateResponse);
}

// ---------------------------------------------------------------------------
// Enroll
// ---------------------------------------------------------------------------

message EnrollRequest {
  // One-time enrollment token generated by admin in the console.
  string enrollment_token = 1;

  // Agent's hybrid public key (generated locally, private key never leaves the device).
  HybridPublicKey agent_public_key = 2;

  // Hardware fingerprint for inventory and anti-replay.
  HardwareFingerprint hardware = 3;

  // Agent software version.
  string agent_version = 4;

  // Whether this is a first-boot enrollment (triggers accelerated profile application).
  bool first_boot = 5;

  // PEM-encoded PKCS#10 CertificateRequest. Server verifies the signature,
  // then signs with the CA and returns the issued X.509 in agent_certificate_pem
  // on the EnrollResponse.
  bytes csr_pem = 6;
}

message HardwareFingerprint {
  string hostname = 1;
  string serial_number = 2; // DMI system serial
  string manufacturer = 3; // DMI system manufacturer
  string model = 4; // DMI product name
  string cpu_model = 5;
  uint64 ram_total_mb = 6;
  uint64 disk_total_gb = 7;
  string arch = 8; // amd64, arm64

  OSInfo os = 9;

  // TPM info (if available).
  TPMInfo tpm = 10;

  // Network interfaces (for site auto-detection).
  repeated NetworkInterface interfaces = 11;
}

// OSInfo, TPMInfo and NetworkInterface are defined in common.proto (shared
// with inventory and health reports).

message EnrollResponse {
  // Assigned device ID.
  DeviceID device_id = 1;

  // Signed agent certificate (X.509 with PQ hybrid extensions).
  bytes agent_certificate = 2;

  // Server's public signing key (for verifying package/policy signatures).
  HybridPublicKey server_signing_key = 3;

  // Assigned tenant.
  TenantID tenant_id = 4;

  // Assigned site (if auto-detected from network subnet or token-bound).
  SiteID site_id = 5;

  // Initial group memberships (from enrollment token).
  repeated string group_ids = 6;

  // Server endpoints for ongoing communication.
  ServerEndpoints endpoints = 7;

  // Initial profiles to apply (if first_boot = true, agent fetches these immediately).
  repeated ProfileID assigned_profiles = 8;

  // Whether this agent is designated as site relay.
  bool is_relay = 9;

  // X.509 certificate PEM signed by the LMDM CA. Presented by the agent for
  // mTLS on subsequent connections. Coexists with agent_certificate
  // (SignedAgentCert bytes) for defense-in-depth at the app layer.
  bytes agent_certificate_pem = 10;

  // CA certificate PEM. Installed in the agent's trust store so the agent
  // can validate the server's TLS cert and the chain of its own certificate.
  bytes ca_certificate_pem = 11;
}

message ServerEndpoints {
  string nats_url = 1; // "tls://fleet.example.com:4222"
  string grpc_url = 2; // "fleet.example.com:50051"
  string api_url = 3; // "https://fleet.example.com"
}

// ---------------------------------------------------------------------------
// Certificate Renewal
// ---------------------------------------------------------------------------

message RenewCertificateRequest {
  DeviceID device_id = 1;
  HybridPublicKey new_public_key = 2; // Agent may rotate its keypair

  // New CSR (fresh keypair each renewal — keys don't rotate without new CSR).
  bytes csr_pem = 3;
}

message RenewCertificateResponse {
  // X.509 certificate PEM signed by the LMDM CA.
  bytes new_certificate = 1;
  google.protobuf.Timestamp expires_at = 2;
}
