version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errcheck
    - gosec
    - gocritic
    - misspell
    - revive
    - unconvert
    - unused
  settings:
    revive:
      rules:
        - name: exported
        - name: error-return
        - name: error-strings
  exclusions:
    paths:
      - gen

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
